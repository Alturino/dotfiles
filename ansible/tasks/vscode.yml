# ansible/tasks/vscode.yml
---
- name: Install VS Code apt repository GPG key
  ansible.builtin.apt_key:
    url: https://packages.microsoft.com/keys/microsoft.asc
    state: present
  become: yes
  tags: gui-apps

- name: Add VS Code apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }} signed-by=/usr/share/keyrings/packages.microsoft.gpg] https://packages.microsoft.com/repos/code stable main"
    state: present
  become: yes
  tags: gui-apps

- name: Install VS Code
  ansible.builtin.apt:
    name: code
    state: present
    update_cache: yes
  become: yes
  tags: gui-apps
